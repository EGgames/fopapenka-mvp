serenity {
  project.name = "Fopapenka MVP Tests"
  take.screenshots = FOR_FAILURES
  reports.show.step.details = true
}

webdriver {
  driver = firefox
  autodownload = false
  capabilities {
    browserName = "firefox"
    "moz:firefoxOptions" {
      args = ["-headless", "--width=1920", "--height=1080"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "http://localhost:5173"
  }
}
